doctrine:
   dbal:
       default_connection: default
       connections:
           default:
               use_savepoints: true
               dbname: '%env(DATABASE_NAME)%'
               user: '%env(DATABASE_USER)%'
               password: '%env(DATABASE_PASSWORD)%'
               host: '%env(DATABASE_HOST)%'
           realtime:
               use_savepoints: true
               dbname: '%env(DATABASE_REALTIME_NAME)%'
               user: '%env(DATABASE_REALTIME_USER)%'
               password: '%env(DATABASE_REALTIME_PASSWORD)%'
               host: '%env(DATABASE_REALTIME_HOST)%'
