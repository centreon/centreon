parameters:
    paths:
        - ./src/App

    layers:
        - name: ResourceConfiguration
          collectors:
              - type: directory
                value: src/App/ResourceConfiguration/.*

        - name: Shared
          collectors:
              - type: directory
                value: src/App/Shared/.*

        - name: Vendors
          collectors:
              - { type: classNameRegex, value: '#^ApiPlatform\\#' }
              - { type: classNameRegex, value: '#^Symfony\\#' }
              - { type: classNameRegex, value: '#^Webmozart\\#' }

        - name: LegacyKernel
          collectors:
              - { type: classNameRegex, value: '#^App\\Kernel$#' }

    ruleset:
        ResourceConfiguration: [ Shared, Vendors ]
        Shared: [ Vendors ]
        LegacyKernel: [ Vendors ]

    skip_violations:
        App\Shared\Infrastructure\Legacy\LegacyKernelWrapper: 
            - App\Kernel
